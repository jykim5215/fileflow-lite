name: build-and-release

on:
  push:
    tags: ["v0.1.*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  windows-build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-python@ece7cb06caefa5fff74198d8649806c4678c61a1 # v6
        with:
          python-version: "3.12"
      - name: Install build tools
        run: python -m pip install "pyinstaller>=6.16" "pillow>=11.0"
      - name: Test
        shell: pwsh
        run: |
          $env:PYTHONPATH = "src"
          python -m unittest discover -s tests -v
      - name: Build
        shell: pwsh
        run: |
          python scripts/generate_icon.py
          python -m PyInstaller --noconfirm --clean --onefile --windowed --name FileFlow-Lite --icon assets/fileflow.ico --paths src src/fileflow_lite/__main__.py
      - name: Package and checksum
        shell: pwsh
        run: powershell -ExecutionPolicy Bypass -File scripts/package.ps1
      - name: Upload workflow artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5
        with:
          name: FileFlow-Lite-Windows
          path: dist-package/*
      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          generate_release_notes: true
          files: |
            dist-package/FileFlow-Lite.exe
            dist-package/FileFlow-Lite-portable.zip
            dist-package/SHA256SUMS.txt
